# Air live reload config — install: go install github.com/air-verse/air@latest
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "billing-radius", "mobile-app", "docs"]
  include_ext = ["go"]
  exclude_regex = ["_test\\.go"]

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = false
