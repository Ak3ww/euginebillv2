server {
    listen 80 default_server;
    server_name 103.151.140.110 _;

    # Go backend: WebSocket for OLT real-time monitoring
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # All requests (including /api/*) go to Next.js (port 3000)
    # Next.js uses NextAuth session cookies - NOT Go JWT Bearer
    # Go backend is accessible directly at port 8080 for internal/future use
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}
