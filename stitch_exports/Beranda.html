<style>
        body { background-color: #F1F5F9; }
        .bento-card { background-color: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 0.125rem; }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-surface bg-background pb-[80px]">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface-bright dark:bg-surface-dim border-b border-hairline-border dark:border-outline-variant z-40 transition-colors duration-200">
<div class="flex justify-between items-center px-margin-mobile h-16 w-full max-w-container-max mx-auto">
<div class="flex items-center gap-4 hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors duration-200 p-2 rounded">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A small, professional avatar image of a person, suitable for a dashboard profile picture, well-lit, neutral background, reflecting enterprise aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqXfaYXfTQAquQqjH2F2ORMFOhVfjttSw6qUb3zPIGcAT19I5sCN-e9IH8zoU4FplfApTjYm3vCC2V06_onIu76tQQ3oE0b2KffQJQr3ehV-dmwdXJJhoVJ0QgtlPLO5ZnTLSli9Yeco_dvtUFeaDu-_y5jju7N0WzWtZJhHjJO8ADzlZXsf4ouYTkKJIdwv6gOuuaHQMi1tn95MITnGMCAOuh4ERIzwhWgxziEjxaFBjnfgFO2pLEWiKvIVCVnQ2nokX5q0tl0TI"/>
</div>
<h1 class="text-headline-md font-headline-md text-primary dark:text-primary-fixed-dim tracking-tight">EugineBill</h1>
</div>
<button class="text-primary dark:text-primary-fixed-dim p-2 rounded-full hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors duration-200 active:opacity-70">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<main class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-6">
<!-- Hero Section -->
<section class="mb-6 flex justify-between items-start md:items-center flex-col md:flex-row gap-4">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Budi Santoso</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">ID Pelanggan: CUST-0921-X</p>
</div>
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-status-active/10 text-status-active">
<span class="material-symbols-outlined text-[16px]">check_circle</span>
<span class="font-label-caps text-label-caps uppercase">Aktif</span>
</div>
</section>
<!-- Bento Grid Layout -->
<div class="grid grid-cols-4 md:grid-cols-8 lg:grid-cols-12 gap-bento-gap">
<!-- Sub/Expiry Module (Spans 8/12 cols depending on screen) -->
<div class="bento-card col-span-4 md:col-span-8 lg:col-span-8 p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
<div>
<h3 class="font-label-caps text-label-caps text-outline uppercase mb-2">Paket Langganan</h3>
<div class="font-headline-lg text-headline-lg text-primary">Paket 30Mbps</div>
<div class="font-body-sm text-on-surface-variant mt-2 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary">speed</span>
                         Up to 30Mbps Download / Upload
                    </div>
</div>
<div class="w-full md:w-px md:h-16 bg-hairline-border md:mx-4"></div>
<div>
<h3 class="font-label-caps text-label-caps text-outline uppercase mb-2">Jatuh Tempo</h3>
<div class="font-headline-md text-headline-md text-on-surface">12 Okt 2024</div>
<div class="inline-block mt-2 px-2 py-1 bg-surface-container-high rounded font-label-caps text-label-caps text-status-warning uppercase border border-hairline-border">
                        Tersisa 5 Hari
                    </div>
</div>
</div>
<!-- Pending Bill Module -->
<div class="bento-card col-span-4 md:col-span-4 lg:col-span-4 p-6 border-l-4 border-l-status-isolated relative overflow-hidden bg-surface-bright">
<!-- Subtle warning background pattern/gradient -->
<div class="absolute top-0 right-0 p-4 opacity-5">
<span class="material-symbols-outlined text-9xl text-status-isolated" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div class="relative z-10 flex flex-col h-full justify-between">
<div>
<h3 class="font-label-caps text-label-caps text-status-isolated uppercase mb-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">receipt_long</span> Tagihan Belum Dibayar
                        </h3>
<p class="font-data-mono text-data-mono text-on-surface-variant">INV-2024-10-001</p>
<div class="font-headline-lg text-headline-lg text-on-surface mt-4">Rp 350.000</div>
</div>
<button class="mt-6 w-full bg-primary-container text-on-primary hover:bg-on-primary-fixed-variant transition-colors py-3 rounded font-label-caps text-label-caps uppercase flex justify-center items-center gap-2">
                        Bayar Sekarang <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
</div>
</div>
<!-- Quick Actions Grid -->
<div class="col-span-4 md:col-span-8 lg:col-span-12 mt-4">
<h3 class="font-headline-md text-headline-md text-on-surface mb-4">Aksi Cepat</h3>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<button class="bento-card p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container-low transition-colors duration-200 active:opacity-70 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform text-3xl">receipt_long</span>
<span class="font-label-caps text-label-caps text-on-surface uppercase">Tagihan</span>
</button>
<button class="bento-card p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container-low transition-colors duration-200 active:opacity-70 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform text-3xl">router</span>
<span class="font-label-caps text-label-caps text-on-surface uppercase">Pengaturan Wi-Fi</span>
</button>
<button class="bento-card p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container-low transition-colors duration-200 active:opacity-70 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform text-3xl">upgrade</span>
<span class="font-label-caps text-label-caps text-on-surface uppercase">Upgrade Layanan</span>
</button>
<button class="bento-card p-4 flex flex-col items-center justify-center gap-3 hover:bg-surface-container-low transition-colors duration-200 active:opacity-70 group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform text-3xl">contact_support</span>
<span class="font-label-caps text-label-caps text-on-surface uppercase">Pusat Bantuan</span>
</button>
</div>
</div>
</div>

<button class="flex flex-col items-center justify-center text-primary dark:text-secondary-fixed-dim font-bold active:scale-95 transition-transform duration-150 hover:bg-surface-container-low p-2 rounded-lg flex-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-caps text-label-caps mt-1">Home</span>
</button>
<!-- Invoices -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline active:scale-95 transition-transform duration-150 hover:bg-surface-container-low p-2 rounded-lg flex-1">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-caps text-label-caps mt-1">Invoices</span>
</button>
<!-- WiFi -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline active:scale-95 transition-transform duration-150 hover:bg-surface-container-low p-2 rounded-lg flex-1">
<span class="material-symbols-outlined">router</span>
<span class="font-label-caps text-label-caps mt-1">WiFi</span>
</button>
<!-- Support -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline active:scale-95 transition-transform duration-150 hover:bg-surface-container-low p-2 rounded-lg flex-1">
<span class="material-symbols-outlined">contact_support</span>
<span class="font-label-caps text-label-caps mt-1">Support</span>
</button>

<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline active:scale-95 transition-transform duration-150 hover:bg-surface-container-low p-2 rounded-lg flex-1">
